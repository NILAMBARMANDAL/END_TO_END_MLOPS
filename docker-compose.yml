# docker-compose.yml — runs the whole serving + monitoring stack with ONE command:
#   docker compose up --build
#
# Services:
#   api        -> your FastAPI model server          (http://localhost:8000/docs)
#   prometheus -> scrapes /metrics every few seconds (http://localhost:9090)
#   grafana    -> dashboards on top of Prometheus     (http://localhost:3000, admin/admin)
services:
  api:
    build: .
    container_name: pdm_api
    ports:
      - "8000:8000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: pdm_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: pdm_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
