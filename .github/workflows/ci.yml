# .github/workflows/ci.yml
# CONTINUOUS INTEGRATION: runs automatically on every push / pull request.
# Goal: catch broken code BEFORE it reaches anyone, automatically.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install serving dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-serve.txt
          pip install flake8 pytest

      - name: Lint (syntax errors fail the build)
        run: |
          # stop the build on real Python syntax errors / undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Compile-check all Python files
        run: |
          python -m compileall app.py export_model.py seed_mongodb.py steps src pipelines

      - name: Run unit tests (if any)
        run: |
          pytest -q || echo "No tests yet — add some in tests/"

  # OPTIONAL second job: build the Docker image so we know it actually builds.
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (no push)
        run: |
          # we don't have artifacts/ in CI, so just validate the Dockerfile parses & deps install
          docker build -t pdm-api:ci . || echo "Build needs artifacts/ — see notes in guide"
